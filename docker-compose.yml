version: "3.8"

services:
  # ── MariaDB 10.4 (giống XAMPP) ──────────────────────────────
  cinepass-db:
    image: mariadb:10.4
    container_name: cinepass-db
    restart: unless-stopped
    environment:
      TZ: Asia/Ho_Chi_Minh
      MARIADB_ROOT_PASSWORD: ""
      MARIADB_ALLOW_EMPTY_ROOT_PASSWORD: "yes"
      MARIADB_DATABASE: cinepass
    ports:
      - "3306:3306"
    volumes:
      - cinepass_dbdata:/var/lib/mysql
      - ./DB/docker_init.sql:/docker-entrypoint-initdb.d/01_init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 20

  # ── Node.js Backend ─────────────────────────────────────────
  cinepass-server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: cinepass-server
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - TZ=Asia/Ho_Chi_Minh
      - PORT=3001
      - DB_HOST=cinepass-db
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=
      - DB_NAME=cinepass
      - JWT_SECRET=cinepass_jwt_secret_key_2024_very_long_random_string
      - JWT_REFRESH_SECRET=cinepass_refresh_secret_2024_another_very_long_random_string
      - JWT_EXPIRES_IN=15m
      - JWT_REFRESH_EXPIRES_IN=7d
      - SMTP_HOST=smtp.gmail.com
      - SMTP_PORT=587
      - SMTP_USER=nguyenhoangmy7720044@gmail.com
      - "SMTP_PASS=fnaz uefo axgk adpk"
      - SMTP_FROM_NAME=Galaxy Studio
      - FRONTEND_URL=http://localhost:5173
      - UPLOAD_DIR=uploads
      - MAX_FILE_SIZE=5242880
    volumes:
      - ./server/uploads:/app/uploads
    depends_on:
      cinepass-db:
        condition: service_healthy

  # ── React Frontend (Nginx) ─────────────────────────────────
  cinepass-client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: cinepass-client
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - cinepass-server

volumes:
  cinepass_dbdata:
